name: Berlin Biyori - Post News

on:
  schedule:
    - cron: '0 */3 * * *'
  workflow_dispatch:

# デフォルトですべての権限を拒否し、ジョブ単位で必要な権限のみ付与する
permissions: {}

jobs:
  post:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: uv sync

      - name: Run bot
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          X_API_KEY: ${{ secrets.X_API_KEY }}
          X_API_SECRET: ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_TOKEN_SECRET: ${{ secrets.X_ACCESS_TOKEN_SECRET }}
          X_BEARER_TOKEN: ${{ secrets.X_BEARER_TOKEN }}
        run: uv run python main.py

      - name: Commit updated cache
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/posted_urls.json
          git diff --staged --quiet || git commit -m "chore: update posted_urls cache"
          git pull --rebase origin main
          for i in 1 2 3; do
            git push && break
            echo "git push failed (attempt $i), retrying in 10s..."
            sleep 10
          done
